name: Deploy Judge UI to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; don't cancel in-progress so we don't leave
# the site in a broken state.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build judge UI
        working-directory: apps/judge-ui
        env:
          # Base path must match the repo name for GitHub Project Pages.
          NEXT_PUBLIC_BASE_PATH: /MemeMe
          # These are baked into the static bundle at build time.
          # Set them in: Settings → Secrets and variables → Actions → Variables
          NEXT_PUBLIC_RUNNER_URL: ${{ vars.NEXT_PUBLIC_RUNNER_URL }}
          NEXT_PUBLIC_RUNNER_TOKEN: ${{ vars.NEXT_PUBLIC_RUNNER_TOKEN }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/judge-ui/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
